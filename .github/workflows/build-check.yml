name: Build Check

on:
  push:
    paths:
      - 'app/**'
      - 'components/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Post result to n8n
        if: always()
        run: |
          curl -X POST "https://liamdegand.app.n8n.cloud/webhook-test/build-result" \
            -H "Content-Type: application/json" \
            -d '{
              "project_id": "${{ github.event.repository.name }}",
              "passed": ${{ job.status == 'success' }},
              "status": "${{ job.status }}",
              "run_url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }'